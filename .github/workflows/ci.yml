name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run check
      - run: npm audit --omit=dev --audit-level=high
      - run: npm pack --dry-run
      - name: Verify the packed extension installs cleanly
        shell: bash
        run: |
          mkdir -p .package-smoke
          npm pack --pack-destination .package-smoke
          npm install --ignore-scripts --omit=peer --prefix .package-smoke/install .package-smoke/*.tgz
          test -d .package-smoke/install/node_modules/pi-ask
